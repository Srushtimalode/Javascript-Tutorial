    <script>
        x = Number(prompt("Enetr the first number:"));

        console.log("X*Y:",x*y);
        if(y==0){
            console.log("can not divided");

        }
        if(y==0){
            console.log("can not module");

        }
    </script>
    <script>
        //Comparison operator
        x = Number(prompt("Enter the first number:"));

    <script>
        //Assignment opreater
        let x = Number(prompt("Enter a initial value:"));

        console.log("Initial value of x:",x);
        x += 5
        console.log("After adding 5:",x);
        x*=3
        console.log("After Multiplying by 3:",x);
        x-=10
        console.log("After Subtracting 10:",x);
        x/=2
        console.log("After divied by 2:",x);
        x%=3
        console.log("Module with 3:",x);
    </script>
    

    <script>
        //Operater Precedence
        let expr1 = 10+3*5;
        let expr2 = (10+3)*5;
        let expr3 = 20/2+3;
        let expr4 = 20/(2+3);
        console.log("10+3*5=",expr1);
        console.log("(10+3)*5=",expr2);
        console.log("20/2+3=",expr3);
        console.log("20/(2+3)",expr4);
    </script>
   
    <script>
        //Combine 
        let length = parseFloat(prompt("Enter length:"));
        let width = parseFloat(prompt("Enter width:"));
        console.log("Enter length:",length);
        console.log("Enter width:",width);
        let perimeter = 2*(length+width);
        let area = length* width;
        console.log("perimeter:",perimeter);
        console.log("area:",area);
        console.log("Is perimeter is greater than area?",perimeter>area);
    </script>

    <script>
        let weigth = parseFloat(prompt("Enter weigth:"));
        let height = parseFloat(prompt("Enter height:"));
        let BMI = weigth/(height*height);
        console.log("BMI:",BMI);
        if(BMI<18.5){
            console.log("Underweight");
        }else if(BMI>=18.5&&BMI<24.9){
            console.log("Normal weight");
        }else if(BMI>25 && BMI<29.9){
            console.log("Overweight")
        }else{
            console.log("Obesity")
        }
    </script>
